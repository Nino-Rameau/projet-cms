services:

  # ─── Base de données MariaDB ─────────────────────────────────────
  cms-db:
    image: mariadb:11
    container_name: cms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pageblanche
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - cms_db_data:/var/lib/mysql
    networks:
      - cms_internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Next.js ─────────────────────────────────────────
  cms:
    build: .
    container_name: cms
    restart: unless-stopped
    depends_on:
      cms-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PROD_DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@cms-db:3306/pageblanche
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${CMS_DOMAIN}
      CMS_DOMAIN: ${CMS_DOMAIN}
    networks:
      - traefik
      - cms_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.cms.rule=Host(`${CMS_DOMAIN}`)"
      - "traefik.http.routers.cms.entrypoints=websecure"
      - "traefik.http.routers.cms.tls.certresolver=letsencrypt"
      - "traefik.http.services.cms.loadbalancer.server.port=3000"

volumes:
  cms_db_data:

networks:
  traefik:
    external: true
  cms_internal:
    internal: true
