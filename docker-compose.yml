services:

  # ─── Base de données MariaDB ─────────────────────────────────────
  cms-db:
    image: mariadb:11
    container_name: cms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pageblanche
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - cms_db_data:/var/lib/mysql
    networks:
      - cms_internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Next.js ─────────────────────────────────────────
  cms:
    build: .
    container_name: cms
    restart: unless-stopped
    depends_on:
      cms-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PROD_DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@cms-db:3306/pageblanche
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://${CMS_DOMAIN}
      CMS_DOMAIN: ${CMS_DOMAIN}
      APP_DOMAIN: ${CMS_DOMAIN}
      NEXT_PUBLIC_VPS_IP: ${NEXT_PUBLIC_VPS_IP}
    networks:
      - traefik
      - cms_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"

      # ─── Service unique partagé par tous les routeurs ────────────
      - "traefik.http.services.cms.loadbalancer.server.port=3000"

      # ─── Routeur principal CMS — HTTPS avec cert Let's Encrypt ──
      - "traefik.http.routers.cms.rule=Host(`${CMS_DOMAIN}`)"
      - "traefik.http.routers.cms.entrypoints=websecure"
      - "traefik.http.routers.cms.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cms.service=cms"
      - "traefik.http.routers.cms.priority=10"

      # ─── Redirect HTTP → HTTPS pour le domaine CMS ───────────────
      - "traefik.http.routers.cms-http.rule=Host(`${CMS_DOMAIN}`)"
      - "traefik.http.routers.cms-http.entrypoints=web"
      - "traefik.http.routers.cms-http.middlewares=https-redirect"
      - "traefik.http.routers.cms-http.priority=10"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

      # ─── Catch-all HTTPS pour les domaines personnalisés ─────────
      # Traefik génère automatiquement un cert Let's Encrypt par domaine
      - "traefik.http.routers.cms-custom.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.cms-custom.entrypoints=websecure"
      - "traefik.http.routers.cms-custom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cms-custom.service=cms"
      - "traefik.http.routers.cms-custom.priority=1"

      # ─── Catch-all HTTP pour les domaines personnalisés ──────────
      - "traefik.http.routers.cms-custom-http.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.cms-custom-http.entrypoints=web"
      - "traefik.http.routers.cms-custom-http.service=cms"
      - "traefik.http.routers.cms-custom-http.priority=1"

volumes:
  cms_db_data:

networks:
  traefik:
    external: true
  cms_internal:
    internal: true
